name: Node CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22.x]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Scripts
        run: pnpm run test:scripts

      - name: Build Project
        run: pnpm run build

      - name: Compile Tests
        run: pnpm run test:compile

      # VS Code integration tests need a display; Linux runners are headless and require xvfb.
      - name: Test Project (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm test

      - name: Test Project (macOS / Windows)
        if: runner.os != 'Linux'
        run: pnpm test

      - name: Lint Project
        run: pnpm run lint

      # Informational marketplace lookup; run once to avoid redundant API calls across the matrix.
      - name: Show Extension Data
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: pnpm run show-data
