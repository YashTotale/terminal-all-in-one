name: Node CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22.x]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Scripts
        run: pnpm run test:scripts

      - name: Build Project
        run: pnpm run build

      - name: Compile Tests
        run: pnpm run test:compile

      # VS Code integration tests need a display; Linux runners are headless and require xvfb.
      - name: Test Project (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a pnpm test

      - name: Test Project (macOS / Windows)
        if: runner.os != 'Linux'
        run: pnpm test

      - name: Lint Project
        run: pnpm run lint

      # Informational marketplace lookup; run once to avoid redundant API calls across the matrix.
      - name: Show Extension Data
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: pnpm run show-data

  lint-workflows:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # actionlint validates workflow YAML/expressions and runs shellcheck over run: blocks.
      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: local
          filter_mode: nofilter
          fail_level: error
