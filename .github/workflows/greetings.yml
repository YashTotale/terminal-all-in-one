name: Greetings

# pull_request_target gives fork PRs a write-capable token; safe here since this workflow only posts a comment, never runs PR code.
on:
  pull_request_target:
    types:
      - opened
  issues:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    name: Greet First-Time Contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          issue_message: |
            👋 Thanks for opening your first issue on **Terminal All In One**! I appreciate you taking the time to help improve the extension.
          pr_message: |
            🎉 Thanks for opening your first pull request to **Terminal All In One**! I really appreciate the contribution and will review it as soon as I can.
