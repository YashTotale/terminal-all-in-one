name: 💡 Feature request
description: Suggest an idea for the Terminal All In One extension
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? E.g., "I'm always frustrated when..."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Related area
      description: Which part of the extension would this affect?
      options:
        - Terminal management
        - Terminal themes
        - Cursor settings
        - Font settings
        - Scripts
        - Keybindings
        - Default shell selection
        - Something new
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've tried.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help.
