name: 🐛 Bug report
description: Report a problem with the Terminal All In One extension
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill out the fields below so the issue can be reproduced.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what's going wrong.
    validations:
      required: true
  - type: dropdown
    id: feature
    attributes:
      label: Affected feature
      description: Which part of the extension is misbehaving?
      options:
        - Terminal management (create / delete / rename / focus / maximize)
        - Terminal themes
        - Cursor settings (width / style / blinking)
        - Font settings (size / weight)
        - Scripts
        - Keybindings
        - Default shell selection
        - Clear terminal
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Open the Command Palette and run "Terminal All In One: ..."
        2. ...
        3. See the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: settings
    attributes:
      label: Relevant settings
      description: Any `terminalAllInOne.*` entries from your settings.json that relate to the bug.
      render: json
  - type: input
    id: extension_version
    attributes:
      label: Extension version
      description: Shown next to "Terminal All In One" in the Extensions view.
      placeholder: "2.0.0"
    validations:
      required: true
  - type: input
    id: vscode_version
    attributes:
      label: VS Code version
      description: From Help → About, or run `code --version`.
      placeholder: "1.96.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: shell
    attributes:
      label: Shell
      description: The terminal shell in use, if relevant (some behavior is shell-specific).
      placeholder: "zsh / bash / PowerShell / cmd"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, recordings, or anything else that might help.
